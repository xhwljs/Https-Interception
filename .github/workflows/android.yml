name: Android CI

on:
  push:
    branches: 
      - main
      - master
      - develop
      - trae/**
      - 'trae/agent-*'
  pull_request:
    branches: 
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK licenses
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1 || true

    - name: Make Gradle wrapper executable
      run: chmod +x ./gradlew
      working-directory: NetworkCapture

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
      working-directory: NetworkCapture

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: NetworkCapture/app/build/outputs/apk/debug/app-debug.apk

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
      working-directory: NetworkCapture

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: NetworkCapture/app/build/outputs/apk/release/app-release-unsigned.apk